name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quick-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Quick governance guard
        run: bash scripts/verify-release.sh --quick
      - name: Contract intake focused guard
        run: bash scripts/test-inputs.sh
      - name: Template package focused guard
        run: bash scripts/test-template-package.sh
      - name: Render focused guard
        run: bash scripts/test-render.sh
      - name: Render check focused guard
        run: bash scripts/test-render-check.sh
      - name: Image map focused guard
        run: bash scripts/test-image-map.sh
      - name: Airgap bundle manifest/digest focused guard
        run: bash scripts/test-airgap-bundle-check.sh
      - name: Kubernetes apply-only focused guard
        run: bash scripts/test-apply.sh
      - name: Kubernetes rollout/live imageID focused guard
        run: bash scripts/test-rollout.sh
      - name: Route smoke focused guard
        run: bash scripts/test-smoke.sh
      - name: Online deployment gate focused guard
        run: bash scripts/test-online-deployment-gate.sh
      - name: Evidence envelope focused guard
        run: bash scripts/test-evidence.sh
      - name: Target preflight focused guard
        run: bash scripts/test-target-preflight.sh
